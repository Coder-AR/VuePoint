<!DOCTYPE html>
<html>
<head>
  <title>VuePoint Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root { --bg-color: #f8fafc; --text-color: #0f172a; --box-bg: #ffffff; --box-border: #e2e8f0; }
    [data-theme="dark"] { --bg-color: #0f172a; --text-color: #f8fafc; --box-bg: #1e293b; --box-border: #334155; }
    body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 20px; }
    .box { background: var(--box-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--box-border); margin-bottom: 20px; }
    input, select { display: block; width: 100%; padding: 8px; margin: 10px 0; border: 1px solid var(--box-border); border-radius: 4px; background: var(--bg-color); color: var(--text-color); }
    button { background: #3b82f6; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; width: 100%; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 10px; border-bottom: 1px solid var(--box-border); text-align: left; }
    .student-card { background: #3b82f6; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    .mock-tag { background: #fbbf24; padding: 2px 6px; font-size: 10px; border-radius: 4px; }
  </style>
</head>
<body>
  <button onclick="toggleTheme()">Toggle Theme</button>
  <h2>VuePoint Portal</h2>

  <div class="box" id="step1">
    <label>Enter Zip Code</label>
    <input type="text" id="zipInput">
    <button onclick="searchDistricts()">Search</button>
    <div id="searchStatus"></div>
  </div>

  <div class="box" id="step2" style="display: none;">
    <label>Select District</label>
    <select id="districtSelect"></select>
    <input type="text" id="usernameInput" placeholder="Username">
    <input type="password" id="passwordInput" placeholder="Password">
    <button onclick="login()">Log In</button>
  </div>

  <div id="dashboardBox" style="display: none;">
    <div id="studentContainer" class="student-card"></div>
    <h3>Grades</h3>
    <table id="gradesTableBody"></table>
    <button id="pdfBtn" onclick="downloadPDF()">Download Report Card</button>
  </div>

        return nameData['#text'] || Object.values(nameData)[0] || "Student";
      }
      return nameData;
    }

      // studentContainer.innerHTML = '<h3>' + getStudentName(result.studentInfo.name) + '</h3>';

    function toggleTheme() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');

  </script>
</body>
</html>
